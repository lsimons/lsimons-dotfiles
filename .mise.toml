[tools]
ruff = "latest"

[tasks.check]
description = "Compile and lint all Python, validate JSON/machines, run tests, and dry-run install"
run = "python3 script/check.py"

[tasks.install]
description = "Run the full dotfiles installer (idempotent). Pass --dry-run to preview."
run = "python3 script/install.py"

[tasks.ci-watch]
description = "Watch GitHub Actions CI for the current branch; exits non-zero on failure"
run = """
sleep 5
run_id=$(gh run list --branch "$(git branch --show-current)" --limit 1 --json databaseId --jq '.[0].databaseId')
if [ -z "$run_id" ]; then echo "No run found for current branch" >&2; exit 1; fi
gh run watch --exit-status "$run_id"
"""
