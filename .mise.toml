[tools]
ruff = "latest"

[tasks.check]
description = "Run lsimons-dotfiles quality checks (py_compile, ruff, JSON, install.py --dry-run)"
run = "python3 script/check.py"

[tasks.install]
description = "Run the full dotfiles installer (idempotent). Pass --dry-run to preview."
run = "python3 script/install.py"
