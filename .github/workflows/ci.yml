name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Check Python syntax
        run: |
          python3 -m py_compile script/install.py
          python3 -m py_compile script/helpers.py
          for f in */install.py; do
            python3 -m py_compile "$f"
          done

      - name: Run ruff linting
        run: |
          pip install ruff
          ruff check script/install.py script/helpers.py --select=E,F,W

      - name: Validate JSON configs
        run: |
          python3 -c "import json; json.load(open('machines/default.json'))"
